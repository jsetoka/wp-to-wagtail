{% extends "base.html" %}
{% load i18n %}

{% block content %}
  <h1>Connexion</h1>

  {% if form.non_field_errors %}
    <div class="alert">{{ form.non_field_errors }}</div>
  {% endif %}

  <form method="post" action="{% url 'account_login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Se connecter</button>
  </form>

  <p>
    <a href="{% url 'account_reset_password' %}">Mot de passe oublié ?</a>
  </p>
  <p>
    <a href="{% url 'account_signup' %}">Créer un compte</a>
  </p>
{% endblock %}
