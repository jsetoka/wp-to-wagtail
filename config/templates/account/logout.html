{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container">
  <h1>Déconnexion</h1>

  <p>Êtes-vous sûr de vouloir vous déconnecter ?</p>

  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit">Confirmer la déconnexion</button>
  </form>

  <p>
    <a href="/">Retour à l’accueil</a>
  </p>
</div>
{% endblock %}
