{% extends "base.html" %}

{% block content %}
<div class="container">
  <h1>Nouveau mot de passe</h1>

  {% if token_fail %}
    <p>Le lien est invalide ou expiré.</p>
  {% else %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Changer le mot de passe</button>
    </form>
  {% endif %}
</div>
{% endblock %}
